services:
  carla:
    image: carlasim/carla:0.9.15
    container_name: carla-gui
    network_mode: host
    runtime: nvidia
    shm_size: "16gb"
    ipc: host
    privileged: true
    ulimits:
      memlock: -1
      stack: 67108864
    stdin_open: true
    tty: true
    environment:
      DISPLAY: ":0"
      XAUTHORITY: "/tmp/.docker.xauth"
      XDG_RUNTIME_DIR: "/run/user/1000"
      QT_X11_NO_MITSHM: "1"
      SDL_VIDEODRIVER: "x11"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      NVIDIA_VISIBLE_DEVICES: "0"                        # explicitly GPU 0 = 4070 Ti
      __GL_SYNC_TO_VBLANK: "0"
      __NV_PRIME_RENDER_OFFLOAD: "1"
      VK_ICD_FILENAMES: "/usr/share/vulkan/icd.d/nvidia_icd.json"  # NVIDIA only, no AMD
    volumes:
      - "/tmp/.X11-unix:/tmp/.X11-unix:rw"
      - "/tmp/.docker.xauth:/tmp/.docker.xauth:rw"
      - "/usr/share/vulkan:/usr/share/vulkan:ro"
    command: >
      /bin/bash -lc "./CarlaUE4.sh -quality-level=Epic -vulkan -prefer-nvidia"
